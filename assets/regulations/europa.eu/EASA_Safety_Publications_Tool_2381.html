<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN"
  "http://www.w3.org/TR/html4/frameset.dtd">
<html>
<head>
<title>EASA Safety Publications Tool</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<script type="text/javascript" src="awd.help_navigation.js"></script>
<script type="text/javascript">
<!--
window.onload = function() {
    var defaulttopic="welcome.htm";
    if (top.location.href.lastIndexOf("?") > 0) defaulttopic=top.location.href.substring(top.location.href.lastIndexOf("?")+1,top.location.href.length);
    // sanitize the defaulttopic variable by encoding or escaping any special characters
    defaulttopic = encodeURIComponent(defaulttopic);
    // create a frameset element with the desired attributes
    var frameset = document.createElement('frameset');
    frameset.setAttribute('cols', '25%,*');
    frameset.setAttribute('frameborder', '1');
    frameset.setAttribute('framespacing', '1');
    // create a frame element for the navigation with the desired attributes
    var navFrame = document.createElement('frame');
    navFrame.setAttribute('name', 'hmnavigation');
    navFrame.setAttribute('title', 'Navigation frame');
    // check if the document has the getElementById method and set the source accordingly
    if (document.getElementById) {
        navFrame.setAttribute('src', 'awd.help_content_dyn.html'); }
    else {
        navFrame.setAttribute('src', 'awd.help_content_static.html'); }
    // create a frame element for the content with the desired attributes
    var contentFrame = document.createElement('frame');
    contentFrame.setAttribute('name', 'hmcontent');
    contentFrame.setAttribute('title', 'Content frame');
    // set the source of the content frame to the sanitized defaulttopic variable
    contentFrame.setAttribute('src', defaulttopic);
    // append the frame elements to the frameset element
    frameset.appendChild(navFrame);
    frameset.appendChild(contentFrame);
    // append the frameset element to the document body
    document.body.appendChild(frameset);
};
//-->
</script>
</head>
<body style="margin: 0">
<noscript>
  <frameset cols="25%,*" frameborder="1" framespacing="1">
    <frame name="hmnavigation" src="awd.help_content_static.html" title="Navigation frame">
    <frame name="hmcontent" src="welcome.htm" title="Content frame">
    <noframes>
      This page requires frames<br><a href="awd.help_content_static.html">Click here to view the table of contents without frames</a>
    </noframes>
  </frameset>
</noscript>
</body>
</html>
